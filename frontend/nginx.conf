server {
    listen 80;
    server_name _;

    # Proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # Serve the React app, with SPA fallback.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
